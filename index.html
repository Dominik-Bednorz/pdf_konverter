<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Konverter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Bild in PDF konvertieren</h1>
    <input type="file" id="fotoinput" accept="image/png, image/jpeg," hidden>
    <label class="buttons" for="fotoinput" id="label">Wähle eine Datei</label>
    <button class="buttons kb" id="convert">Keine Datei ausgewählt</button>
    <button class="buttons qb" onclick="window.open('quellen.html', '_self')">Quellen</button>
</div>

<script src="app.js"></script>
<script src="jspdf.umd.min.js"></script>
</body>
</html>
